<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <!-- Solahart Logo -->
  <defs>
    <linearGradient id="shGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E65C00"/>
      <stop offset="100%" style="stop-color:#FF8500"/>
    </linearGradient>
  </defs>
  <!-- Solar collector graphic -->
  <rect x="8" y="15" width="40" height="30" rx="3" fill="url(#shGrad)"/>
  <line x1="15" y1="15" x2="15" y2="45" stroke="#FFF" stroke-width="2"/>
  <line x1="25" y1="15" x2="25" y2="45" stroke="#FFF" stroke-width="2"/>
  <line x1="35" y1="15" x2="35" y2="45" stroke="#FFF" stroke-width="2"/>
  <line x1="8" y1="25" x2="48" y2="25" stroke="#FFF" stroke-width="1.5"/>
  <line x1="8" y1="35" x2="48" y2="35" stroke="#FFF" stroke-width="1.5"/>
  <!-- Sun -->
  <circle cx="50" cy="12" r="8" fill="#FFD700"/>
  <!-- Brand name -->
  <text x="65" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#E65C00">SOLAHART</text>
</svg>
