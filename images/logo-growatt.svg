<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <!-- Growatt Logo -->
  <defs>
    <linearGradient id="gwGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00A651"/>
      <stop offset="100%" style="stop-color:#00C853"/>
    </linearGradient>
  </defs>
  <!-- G icon with leaf -->
  <circle cx="28" cy="30" r="20" fill="url(#gwGrad)"/>
  <text x="28" y="40" font-family="Arial, sans-serif" font-size="30" font-weight="900" fill="#FFF" text-anchor="middle">G</text>
  <!-- Small leaf -->
  <ellipse cx="42" cy="18" rx="6" ry="8" fill="#00C853" transform="rotate(-30 42 18)"/>
  <!-- Brand name -->
  <text x="58" y="38" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#00A651">GROWATT</text>
</svg>
