<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60">
  <!-- Huawei Logo -->
  <defs>
    <linearGradient id="hwGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#CF0A2C"/>
      <stop offset="100%" style="stop-color:#E31837"/>
    </linearGradient>
  </defs>
  <!-- Fan/petal design -->
  <g transform="translate(28,30)">
    <ellipse cx="0" cy="-15" rx="5" ry="12" fill="url(#hwGrad)"/>
    <ellipse cx="14" cy="-5" rx="5" ry="12" fill="url(#hwGrad)" transform="rotate(72)"/>
    <ellipse cx="9" cy="12" rx="5" ry="12" fill="url(#hwGrad)" transform="rotate(144)"/>
    <ellipse cx="-9" cy="12" rx="5" ry="12" fill="url(#hwGrad)" transform="rotate(216)"/>
    <ellipse cx="-14" cy="-5" rx="5" ry="12" fill="url(#hwGrad)" transform="rotate(288)"/>
  </g>
  <!-- Brand name -->
  <text x="58" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#CF0A2C" letter-spacing="2">HUAWEI</text>
</svg>
