<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 60">
  <!-- LONGi Logo -->
  <defs>
    <linearGradient id="lgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#D7000F"/>
      <stop offset="100%" style="stop-color:#FF1A2E"/>
    </linearGradient>
  </defs>
  <!-- Circular icon with L -->
  <circle cx="28" cy="30" r="22" fill="url(#lgGrad)"/>
  <text x="28" y="40" font-family="Arial, sans-serif" font-size="32" font-weight="900" fill="#FFF" text-anchor="middle">L</text>
  <!-- Brand name -->
  <text x="58" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="800" fill="#D7000F" letter-spacing="1">LONGi</text>
</svg>
